version: '3.9'

services:
  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/frontend.Dockerfile
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/v1
      INTERNAL_API_BASE_URL: http://backend:4000
    depends_on:
      - backend

  backend:
    build:
      context: ../..
      dockerfile: infra/docker/backend.Dockerfile
    ports:
      - '4000:4000'
    env_file:
      - ../../.env
    environment:
      FRONTEND_ORIGIN: http://localhost:3000
      FRONTEND_OAUTH_REDIRECT: http://localhost:3000
      GOOGLE_CALLBACK_URL: http://localhost:4000/v1/auth/google/callback
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ezeeflights
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../../sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  elasticsearch:
    image: elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    ports:
      - '9200:9200'
    volumes:
      - esdata:/usr/share/elasticsearch/data

  kibana:
    image: kibana:8.12.0
    ports:
      - '5601:5601'
    depends_on:
      - elasticsearch

volumes:
  pg_data:
  esdata:
